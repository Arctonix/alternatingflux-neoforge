modLoader = "javafml"
loaderVersion = "[4,)"
license = "Custom — see README / original Alternating Flux license"
issueTrackerURL = "https://github.com/Arctonix/alternatingflux-neoforge/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "https://github.com/Arctonix/alternatingflux-neoforge"
authors = "AntiBlueQuirk (original), Arctonix (1.21.1 port)"
description = '''
Adds Alternating Flux, long-distance super-high-voltage wire tiers for Immersive
Engineering. Two tiers — AF and the higher UAF (Ultra High Alternating Flux) — each
with very low loss over distance. Neither powers machines directly; step down to HV
through a transformer (HV<->AF, HV<->UAF, or AF<->UAF). Ported to 1.21.1 / NeoForge.
'''

# Hard dependency on Immersive Engineering.
[[dependencies.${mod_id}]]
modId = "immersiveengineering"
type = "required"
versionRange = "[12.0,)"
ordering = "AFTER"
side = "BOTH"

# NeoForge.
[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

# Minecraft.
[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "BOTH"
