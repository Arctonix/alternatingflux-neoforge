modLoader = "javafml"
loaderVersion = "[47,)"
license = "Custom — see LICENSE / original Alternating Flux"
issueTrackerURL = "https://github.com/Arctonix/alternating-flux-forge/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "AntiBlueQuirk (original), Arctonix (port)"
description = '''
Adds Alternating Flux (AF), a long-distance super-high-voltage wire tier for
Immersive Engineering. Very low loss over distance; cannot power machines
directly — step down to HV through an AF Transformer. Ported to 1.20.1 / Forge.
'''

# Hard dependency on Immersive Engineering 10.x (1.20.1 branch).
[[dependencies.${mod_id}]]
modId = "immersiveengineering"
mandatory = true
versionRange = "[1.20.1-10.0,)"
ordering = "AFTER"
side = "BOTH"

# Forge.
[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

# Minecraft.
[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.20.2)"
ordering = "NONE"
side = "BOTH"
