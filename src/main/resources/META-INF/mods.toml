modLoader = "javafml"
loaderVersion = "[43,)"
license = "Custom — see LICENSE file"
issueTrackerURL = "https://github.com/Arctonix/alternatingflux-neoforge/issues"
displayURL = "https://github.com/Arctonix/alternatingflux-neoforge"
updateJSONURL = "https://raw.githubusercontent.com/Arctonix/alternatingflux-neoforge/master/update.json"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "AntiBlueQuirk (original), Arctonix (port)"
description = '''
Adds Alternating Flux (AF) and Ultra High Alternating Flux (UAF), long-distance
super-high-voltage wire tiers for Immersive Engineering. Very low loss over
distance; cannot power machines directly — step down through an AF Transformer
(HV<->AF) or a UAF Transformer (HV<->UAF or AF<->UAF). Ported to 1.19.2 / Forge.
'''

# Hard dependency on Immersive Engineering, floored at the pinned 9.2 line
# (the jar this targets reports version 1.19.2-9.2.4-170).
[[dependencies.${mod_id}]]
modId = "immersiveengineering"
mandatory = true
versionRange = "[1.19.2-9.2,)"
ordering = "AFTER"
side = "BOTH"

# Forge — the 1.19.2 line.
[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[43,44)"
ordering = "NONE"
side = "BOTH"

# Minecraft 1.19.2.
[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[1.19.2,1.20)"
ordering = "NONE"
side = "BOTH"
