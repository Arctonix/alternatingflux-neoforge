modLoader = "javafml"
loaderVersion = "[47,48)"
license = "Custom — see LICENSE file"
issueTrackerURL = "https://github.com/Arctonix/alternatingflux-neoforge/issues"
updateJSONURL = "https://raw.githubusercontent.com/Arctonix/alternatingflux-neoforge/master/update.json"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "https://github.com/Arctonix/alternatingflux-neoforge"
authors = "AntiBlueQuirk (original), Arctonix (port)"
description = '''
Adds Alternating Flux (AF) and Ultra High Alternating Flux (UAF), long-distance
super-high-voltage wire tiers for Immersive Engineering. Very low loss over
distance; cannot power machines directly — step down through an AF Transformer
(HV<->AF) or a UAF Transformer (HV<->UAF or AF<->UAF). Ported to 1.20.1 / Forge.
'''

# Hard dependency on Immersive Engineering 10.2.x (1.20.1 branch), floored at the
# pinned line and bounded below the next major (built against 1.20.1-10.2.0-183).
[[dependencies.${mod_id}]]
modId = "immersiveengineering"
mandatory = true
versionRange = "[1.20.1-10.2,1.20.1-11)"
ordering = "AFTER"
side = "BOTH"

# Forge (1.20.1 line).
[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[47,48)"
ordering = "NONE"
side = "BOTH"

# Minecraft.
[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "BOTH"
