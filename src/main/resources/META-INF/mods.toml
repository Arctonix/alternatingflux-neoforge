modLoader = "javafml"
loaderVersion = "[43,)"
license = "Custom — see LICENSE / original Alternating Flux"
issueTrackerURL = "https://github.com/Arctonix/alternatingflux-neoforge/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "AntiBlueQuirk (original), Arctonix (port)"
description = '''
Adds Alternating Flux (AF) and Ultra High Alternating Flux (UAF), long-distance
super-high-voltage wire tiers for Immersive Engineering. Very low loss over
distance; cannot power machines directly — step down through an AF Transformer
(HV<->AF) or a UAF Transformer (HV<->UAF or AF<->UAF). Ported to 1.19.2 / Forge.
'''

# Hard dependency on Immersive Engineering 9.x (1.19.2 branch).
[[dependencies.${mod_id}]]
modId = "immersiveengineering"
mandatory = true
versionRange = "[1.19.2-9.2,)"
ordering = "AFTER"
side = "BOTH"

# Forge.
[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[43,)"
ordering = "NONE"
side = "BOTH"

# Minecraft.
[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[1.19.2,1.19.3)"
ordering = "NONE"
side = "BOTH"
